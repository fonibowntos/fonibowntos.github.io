<!doctype html>
<html lang="el">
    <head>
        <meta charset="UTF-8" />
        <title>agathoniki.com</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap"
            rel="stylesheet"
        />
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                font-family: Georgia, "Times New Roman", Times, serif;
            }
            body {
                min-height: 100vh;
                color: #000000;

                background-color: #cd8602;
                background-image:
                    radial-gradient(circle at center center, #ffffff, #cd8602),
                    repeating-radial-gradient(
                        circle at center center,
                        #ffffff,
                        #ffffff,
                        4px,
                        transparent 8px,
                        transparent 4px
                    );
                background-blend-mode: multiply;
            }
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 24px;
                box-sizing: border-box;
            }

            .site-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 32px 0 16px;
            }
            .logo {
                display: flex;
                flex-direction: column;
                align-items: flex-end;
            }
            h1 {
                margin: 0;
                font-family: "Special Elite", system-ui;
                font-size: 56px;
                font-weight: 800;
                color: #b266ff;
                text-shadow: 4px 4px 4px black;
                letter-spacing: 0.02em;
                line-height: 1;
            }
            .logo-subtitle {
                margin-top: 4px;
                font-family: "Special Elite", Georgia, serif;
                font-size: 18px;
                font-style: italic;
                color: #ffffff;
                text-shadow: 2px 2px 2px rgba(0, 0, 0, 0.6);
                letter-spacing: 0.08em;
            }
            .email-link {
                color: white;
                font-family: Arial, sans-serif;
                font-size: 16px;
                font-weight: 600;
                text-decoration: none;
                letter-spacing: 0.15em;
                white-space: nowrap;
            }
            .email-link .email-text {
                text-decoration: underline;
            }

            .site-nav {
                background: rgba(255, 255, 255, 0.55);
                border-top: 2px solid #b266ff;
                border-bottom: 2px solid #b266ff;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
                margin-top: 8px;
            }
            .menu {
                list-style: none;
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 0;
            }
            .menu > li {
                position: relative;
                flex: 0 1 auto;
            }
            .menu a.menu-link {
                display: block;
                color: #000;
                font-family: "Special Elite", Georgia, serif;
                font-size: 14px;
                letter-spacing: 0;
                padding: 14px 6px;
                text-decoration: none;
                text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.6);
                border-bottom: 3px solid transparent;
                transition: border-color 0.2s ease, color 0.2s ease, background-color 0.2s ease;
                white-space: nowrap;
            }
            .cross {
                position: relative;
                display: inline-block;
                vertical-align: middle;
                width: 12px;
                height: 18px;
                flex-shrink: 0;
                user-select: none;
            }
            .cross::before,
            .cross::after {
                content: "";
                position: absolute;
                background: #b266ff;
                box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.25);
            }
            .cross::before {
                top: 0;
                bottom: 0;
                left: 50%;
                width: 2px;
                margin-left: -1px;
            }
            .cross::after {
                top: 5px;
                height: 2px;
                left: 1px;
                right: 1px;
            }
            .menu a.menu-link:hover,
            .menu a.menu-link:focus {
                color: #b266ff;
                background-color: rgba(255, 255, 255, 0.4);
                border-bottom-color: #b266ff;
                outline: none;
            }
            .has-submenu > .menu-link::after {
                content: " ▾";
                font-size: 0.8em;
                margin-left: 4px;
            }

            .submenu {
                list-style: none;
                margin: 0;
                padding: 6px 0;
                position: absolute;
                top: 100%;
                left: 0;
                min-width: 200px;
                background: rgba(255, 255, 255, 0.97);
                border: 1px solid #cd8602;
                border-top: none;
                box-shadow: 2px 4px 8px rgba(0, 0, 0, 0.3);
                display: none;
                z-index: 10;
            }
            .has-submenu:hover > .submenu,
            .has-submenu:focus-within > .submenu {
                display: block;
            }
            .submenu a.menu-link {
                padding: 10px 14px;
                font-size: 14px;
                text-align: left;
                border-bottom: none;
            }
            .submenu a.menu-link:hover,
            .submenu a.menu-link:focus {
                border-bottom-color: transparent;
            }

            main {
                padding: 48px 0;
                min-height: 400px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header class="site-header">
                <div class="logo">
                    <h1>Agathoniki.com</h1>
                    <span class="logo-subtitle">☦ Orthodox nun ☦</span>
                </div>
                <a class="email-link" href="mailto:fonibowntos@gmail.com"
                    >💌 <span class="email-text">Επικοινωνία</span></a
                >
            </header>
        </div>
        <nav class="site-nav" aria-label="Κύριο μενού">
            <div class="container">
                <ul class="menu">
                    <li class="has-submenu">
                        <a class="menu-link" href="#paidika">Παιδικά</a>
                        <ul class="submenu">
                            <li><a class="menu-link" href="#tragoudia">Τραγούδια</a></li>
                            <li><a class="menu-link" href="#paramythia">Παραμύθια</a></li>
                        </ul>
                    </li>
                    <li class="cross" aria-hidden="true"></li>
                    <li><a class="menu-link" href="#vioi-agion">Βίοι Αγίων</a></li>
                    <li class="cross" aria-hidden="true"></li>
                    <li><a class="menu-link" href="#synaxaristis">Ορθόδοξος Συναξαριστής</a></li>
                    <li class="cross" aria-hidden="true"></li>
                    <li><a class="menu-link" href="#palaia-diathiki">Παλαιά Διαθήκη</a></li>
                    <li class="cross" aria-hidden="true"></li>
                    <li><a class="menu-link" href="#kaini-diathiki">Καινή Διαθήκη</a></li>
                    <li class="cross" aria-hidden="true"></li>
                    <li><a class="menu-link" href="#ekklisiastika-vivlia">Εκκλησιαστικά Βιβλία</a></li>
                    <li class="cross" aria-hidden="true"></li>
                    <li><a class="menu-link" href="#apokalypseis-erevnes">Αποκαλύψεις / Έρευνες</a></li>
                </ul>
            </div>
        </nav>
        <main class="container"></main>
    </body>
</html>
