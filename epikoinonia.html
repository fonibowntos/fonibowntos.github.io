<!doctype html>
<html lang="el">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex, nofollow" />
        <title>Επικοινωνία — agathoniki.com</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
        <style>
            .contact-form {
                display: grid;
                gap: 18px;
                max-width: 600px;
                margin: 0;
            }
            .contact-form label {
                display: flex;
                flex-direction: column;
                gap: 6px;
                font-family: "Special Elite", Georgia, serif;
                font-size: 14px;
                letter-spacing: 0.04em;
            }
            .contact-form input,
            .contact-form textarea {
                padding: 10px 12px;
                border: 1px solid #cd8602;
                border-radius: 4px;
                background: rgba(255, 255, 255, 0.92);
                font: inherit;
                font-size: 16px;
                color: #1a1a1a;
            }
            .contact-form textarea {
                min-height: 160px;
                resize: vertical;
            }
            .contact-form input:focus,
            .contact-form textarea:focus {
                outline: 2px solid #b266ff;
                outline-offset: 1px;
                border-color: #b266ff;
            }
            .contact-form button {
                justify-self: start;
                padding: 12px 28px;
                background: #b266ff;
                color: #fff;
                border: 2px solid #b266ff;
                border-radius: 4px;
                font-family: "Special Elite", Georgia, serif;
                font-size: 16px;
                letter-spacing: 0.05em;
                cursor: pointer;
                text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.3);
                transition:
                    background-color 0.2s ease,
                    color 0.2s ease;
            }
            .contact-form button:hover,
            .contact-form button:focus {
                background: #fff;
                color: #b266ff;
                outline: none;
            }
            .contact-form .form-note {
                font-size: 13px;
                color: #555;
                font-style: italic;
                margin: 0;
            }
            .form-status {
                max-width: 600px;
                margin: 12px 0 0;
                padding: 12px 16px;
                border-radius: 4px;
                background: rgba(178, 102, 255, 0.12);
                border-left: 3px solid #b266ff;
                font-size: 14px;
            }
            .form-status[hidden] {
                display: none;
            }
            .form-status.is-error {
                background: rgba(220, 53, 69, 0.12);
                border-left-color: #dc3545;
            }
        </style>
        <script src="header.js" defer></script>
        <script src="menu.js" defer></script>
        <script src="footer.js" defer></script>
        <script src="breadcrumbs.js" defer></script>
    </head>
    <body>
        <site-header></site-header>
        <site-menu></site-menu>
        <main class="container">
            <site-breadcrumbs>
                    <li><a href="index.html">Αρχική</a></li>
                    <li aria-current="page">Επικοινωνία</li>
            </site-breadcrumbs>
            <div class="page-content">
                <div class="page-content-inner">
                    <h1>Επικοινωνία</h1>
                    <p>
                        Συμπληρώστε τη φόρμα παρακάτω για να μας στείλετε
                        μήνυμα.
                    </p>
                    <form
                        class="contact-form"
                        id="contact-form"
                        action="https://api.staticforms.dev/submit"
                        method="POST"
                    >
                        <input
                            type="hidden"
                            name="apiKey"
                            value="sf_32d13233d450c85fe6c9b46b"
                        />
                        <input
                            type="hidden"
                            name="subject"
                            value="Επικοινωνία από agathoniki.com: {{theme}}"
                        />
                        <input type="hidden" name="replyTo" value="{{email}}" />
                        <input
                            type="text"
                            name="honeypot"
                            style="display: none"
                            tabindex="-1"
                            autocomplete="off"
                        />
                        <label>
                            <span>Όνομα</span>
                            <input
                                type="text"
                                name="name"
                                autocomplete="name"
                                required
                            />
                        </label>
                        <label>
                            <span>Ηλεκτρονικό ταχυδρομείο</span>
                            <input
                                type="email"
                                name="email"
                                autocomplete="email"
                                required
                            />
                        </label>
                        <label>
                            <span>Θέμα</span>
                            <input type="text" name="theme" required />
                        </label>
                        <label>
                            <span>Μήνυμα</span>
                            <textarea name="message" required></textarea>
                        </label>
                        <button type="submit">Αποστολή</button>
                        <p class="form-note">
                            Εναλλακτικά μπορείτε να μας γράψετε απευθείας στο
                            <a href="mailto:a@agathoniki.com"
                                >a@agathoniki.com</a
                            >.
                        </p>
                    </form>
                    <div
                        class="form-status"
                        id="form-status"
                        role="status"
                        aria-live="polite"
                        hidden
                    ></div>
                </div>
            </div>
        </main>
        <site-footer></site-footer>
        <script>
            (() => {
                const form = document.getElementById("contact-form");
                const status = document.getElementById("form-status");
                if (!form || !status) return;
                const submitBtn = form.querySelector("button[type='submit']");
                form.addEventListener("submit", async (event) => {
                    event.preventDefault();
                    if (!form.reportValidity()) return;
                    if (submitBtn) submitBtn.disabled = true;
                    status.hidden = false;
                    status.classList.remove("is-error");
                    status.textContent = "Αποστολή…";
                    try {
                        const response = await fetch(form.action, {
                            method: "POST",
                            body: new FormData(form),
                        });
                        if (response.ok) {
                            form.reset();
                            form.hidden = true;
                            status.textContent =
                                "Το μήνυμά σας στάλθηκε. Ευχαριστούμε!";
                        } else {
                            status.classList.add("is-error");
                            status.textContent =
                                "Συνέβη σφάλμα κατά την αποστολή. Δοκιμάστε ξανά αργότερα.";
                            if (submitBtn) submitBtn.disabled = false;
                        }
                    } catch (err) {
                        status.classList.add("is-error");
                        status.textContent =
                            "Συνέβη σφάλμα δικτύου. Δοκιμάστε ξανά αργότερα.";
                        if (submitBtn) submitBtn.disabled = false;
                    }
                });
            })();
        </script>
    </body>
</html>
