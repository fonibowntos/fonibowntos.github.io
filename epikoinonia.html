<!doctype html>
<html lang="el">
    <head>
        <meta charset="UTF-8" />
        <meta name="robots" content="noindex, nofollow" />
        <title>Επικοινωνία — agathoniki.com</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
        <style>
            .contact-form {
                display: grid;
                gap: 18px;
                max-width: 600px;
                margin: 0 auto;
            }
            .contact-form label {
                display: flex;
                flex-direction: column;
                gap: 6px;
                font-family: "Special Elite", Georgia, serif;
                font-size: 14px;
                letter-spacing: 0.04em;
            }
            .contact-form input,
            .contact-form textarea {
                padding: 10px 12px;
                border: 1px solid #cd8602;
                border-radius: 4px;
                background: rgba(255, 255, 255, 0.92);
                font: inherit;
                font-size: 16px;
                color: #1a1a1a;
            }
            .contact-form textarea {
                min-height: 160px;
                resize: vertical;
            }
            .contact-form input:focus,
            .contact-form textarea:focus {
                outline: 2px solid #b266ff;
                outline-offset: 1px;
                border-color: #b266ff;
            }
            .contact-form button {
                justify-self: start;
                padding: 12px 28px;
                background: #b266ff;
                color: #fff;
                border: 2px solid #b266ff;
                border-radius: 4px;
                font-family: "Special Elite", Georgia, serif;
                font-size: 16px;
                letter-spacing: 0.05em;
                cursor: pointer;
                text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.3);
                transition:
                    background-color 0.2s ease,
                    color 0.2s ease;
            }
            .contact-form button:hover,
            .contact-form button:focus {
                background: #fff;
                color: #b266ff;
                outline: none;
            }
            .contact-form .form-note {
                font-size: 13px;
                color: #555;
                font-style: italic;
                margin: 0;
            }
        </style>
        <script src="header.js" defer></script>
        <script src="menu.js" defer></script>
        <script src="footer.js" defer></script>
        <script src="breadcrumbs.js" defer></script>
    </head>
    <body>
        <site-header></site-header>
        <site-menu></site-menu>
        <main class="container">
            <site-breadcrumbs>
                    <li><a href="index.html">Αρχική</a></li>
                    <li aria-current="page">Επικοινωνία</li>
            </site-breadcrumbs>
            <div class="page-content">
                <div class="page-content-inner">
                    <h1>Επικοινωνία</h1>
                    <p>
                        Συμπληρώστε τη φόρμα παρακάτω για να μας στείλετε
                        μήνυμα.
                    </p>
                    <form
                        class="contact-form"
                        action="https://formsubmit.co/a@agathoniki.com"
                        method="POST"
                    >
                        <input type="hidden" name="_template" value="box" />
                        <input
                            type="text"
                            name="_honey"
                            style="display: none"
                            tabindex="-1"
                            autocomplete="off"
                        />
                        <label>
                            <span>Όνομα</span>
                            <input
                                type="text"
                                name="name"
                                autocomplete="name"
                                required
                            />
                        </label>
                        <label>
                            <span>Ηλεκτρονικό ταχυδρομείο</span>
                            <input
                                type="email"
                                name="email"
                                autocomplete="email"
                                required
                            />
                        </label>
                        <label>
                            <span>Θέμα</span>
                            <input type="text" name="_subject" required />
                        </label>
                        <label>
                            <span>Μήνυμα</span>
                            <textarea name="message" required></textarea>
                        </label>
                        <button type="submit">Αποστολή</button>
                        <p class="form-note">
                            Εναλλακτικά μπορείτε να μας γράψετε απευθείας στο
                            <a href="mailto:a@agathoniki.com"
                                >a@agathoniki.com</a
                            >.
                        </p>
                    </form>
                </div>
            </div>
        </main>
        <site-footer></site-footer>
    </body>
</html>
